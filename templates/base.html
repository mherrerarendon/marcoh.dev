<!doctype html>
<html lang="{{ lang }}">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}{{ config.title }}{% endblock %}</title>
        <meta name="description" content="{{ config.description }}" />
        <link rel="icon" type="image/svg+xml" href="{{ get_url(path="favicon.svg") | safe }}">

        <style>
            :root {
                --bg: #fff;
                --text: #222;
                --light-text: #666;
                --link: #000;
                --border: #eee;
                --code-bg: #f4f4f4;
                --max-width: 650px;
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: #121212;
                    --text: #e0e0e0;
                    --light-text: #a0a0a0;
                    --link: #fff;
                    --border: #2c2c2c;
                    --code-bg: #1d1d1d;
                }
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                line-height: 1.7;
                color: var(--text);
                background: var(--bg);
                max-width: var(--max-width);
                margin: 0 auto;
                padding: 2rem 1.5rem;
            }

            header {
                margin-bottom: 3rem;
            }

            header h1 {
                font-size: 1.5rem;
                font-weight: 700;
                margin: 0 0 0.5rem 0;
            }

            header h1 a {
                text-decoration: none;
                color: var(--link);
            }

            nav {
                display: flex;
                align-items: center;
                gap: 1.2rem;
            }

            nav a {
                color: var(--light-text);
                text-decoration: none;
                font-size: 0.9rem;
                display: flex;
                align-items: center;
            }

            nav a:hover {
                color: var(--link);
                text-decoration: underline;
            }

            main {
                min-height: 400px;
            }

            h1,
            h2,
            h3 {
                color: var(--link);
                line-height: 1.3;
            }

            h2 {
                font-size: 1.3rem;
                margin-top: 2rem;
            }

            a {
                color: var(--link);
                text-decoration-underline-position: under;
            }

            ul {
                list-style-type: square;
                padding-left: 1.2rem;
            }

            li {
                margin-bottom: 0.5rem;
            }

            .post-list {
                list-style: none;
                padding: 0;
            }

            .post-item {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
                margin-bottom: 0.75rem;
            }

            .year-heading {
                font-size: 1rem;
                font-weight: 600;
                color: var(--light-text);
                border-bottom: none;
                margin-top: 2rem;
                margin-bottom: 0.5rem;
            }

            .post-date {
                font-family: monospace;
                color: var(--light-text);
                font-size: 0.9rem;
                white-space: nowrap;
                margin-left: 1rem;
            }

            .meta {
                color: var(--light-text);
                font-size: 0.9rem;
                margin-bottom: 2rem;
            }

            code {
                font-family:
                    ui-monospace,
                    SFMono-Regular,
                    SF Mono,
                    Menlo,
                    Consolas,
                    Liberation Mono,
                    monospace;
                background: var(--code-bg);
                padding: 0.2rem 0.4rem;
                border-radius: 3px;
                font-size: 0.85em;
            }

            pre {
                background: var(--code-bg);
                padding: 1rem;
                overflow-x: auto;
                border-radius: 4px;
            }

            pre code {
                background: none;
                padding: 0;
                font-size: 0.9em;
            }

            .post-header {
                margin-bottom: 2.5rem;
            }

            .post-header h1 {
                font-size: 1.8rem;
                margin-bottom: 0.4rem;
            }

            .tag {
                font-style: italic;
            }

            .toc {
                border: 1px solid var(--border);
                border-radius: 4px;
                padding: 1rem 1.25rem;
                margin-bottom: 2.5rem;
                font-size: 0.9rem;
            }

            .toc-title {
                font-size: 0.8rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: var(--light-text);
                margin: 0 0 0.75rem 0;
                border-bottom: none;
            }

            .toc ul {
                list-style: none;
                padding: 0;
                margin: 0;
            }

            .toc li {
                margin-bottom: 0.35rem;
            }

            .toc > ul > li > ul {
                padding-left: 1rem;
                margin-top: 0.35rem;
                border-left: 1px solid var(--border);
            }

            .toc > ul > li > ul > li > ul {
                padding-left: 1rem;
                margin-top: 0.35rem;
            }

            .toc a {
                text-decoration: none;
                color: var(--light-text);
            }

            .toc a:hover {
                color: var(--text);
            }

            blockquote {
                border-left: 3px solid var(--border);
                margin-left: 0;
                padding-left: 1.25rem;
                color: var(--light-text);
                font-style: italic;
            }

            .callout {
                border-left: 3px solid var(--light-text);
                border-radius: 0 6px 6px 0;
                background: var(--code-bg);
                padding: 0.9rem 1.25rem;
                margin: 1.75rem 0;
            }

            .callout-tip  { border-left-color: #4caf50; }
            .callout-warn { border-left-color: #f59e0b; }
            .callout-info { border-left-color: #3b82f6; }

            .callout-title {
                font-size: 0.75rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                margin: 0 0 0.5rem 0;
                color: var(--text);
            }

            .callout-body > p:first-child { margin-top: 0; }
            .callout-body > p:last-child  { margin-bottom: 0; }

            footer {
                margin-top: 4rem;
                border-top: 1px solid var(--border);
                padding-top: 1.5rem;
                font-size: 0.85rem;
                color: var(--light-text);
            }


        </style>
    </head>
    <body>
        <header>
            <h1><a href="{{ config.base_url }}">{{ config.title }}</a></h1>
            <nav>
                <a href="/blog/">Writing</a>
                {% if config.extra.github %}
                <a href="{{ config.extra.github }}" target="_blank" rel="noopener" aria-label="GitHub">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-4.51-2-7-2"/></svg>
                </a>
                {% endif %}
                {% if config.extra.linkedin %}
                <a href="{{ config.extra.linkedin }}" target="_blank" rel="noopener" aria-label="LinkedIn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
                </a>
                {% endif %}
            </nav>
        </header>

        <main>{% block content %}{% endblock %}</main>
    </body>
</html>
